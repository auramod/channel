<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siren's Kiss - Drama Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #525254;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff;
        }
        
        .video-container {
            background: #373636;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0px 20px rgba(187, 187, 187, 0.5);
        }
        
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        .episode-info {
            background: #353535;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .episode-info h2 {
            margin-bottom: 10px;
            color: #929195;
        }
        
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .episode-btn {
            padding: 12px 20px;
            background: #3f3e3e;
            border: 2px solid #a3a0a0;
            color: #ffffff;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1em;
        }
        
        .episode-btn:hover {
            background: #000000;
            border-color: #5b5b5d;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(167, 166, 166, 0.5);
        }
        
        .episode-btn.active {
            background: #000000;
            border-color: #424141;
            box-shadow: 0 0 15px rgba(167, 166, 166, 0.5);
        }
        
        .quality-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .quality-btn {
            padding: 10px 15px;
            background: #373636;
            border: 2px solid #363636;
            color: #f7f7ff;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
            margin: 0 5px;
        }
        
        .quality-btn:hover {
            background: #000000;
            border-color: #000000;
            transform: translateY(-2px);
        }
        
        .quality-btn.active {
            background: #000000;
            border-color: #464545;
            box-shadow: 0 0 15px rgba(249, 245, 245, 0.5);
        }
        
        .description {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> SIREN'S KISS</h1>
            <p>K-Drama Series | Watch All Episodes</p>
        </div>
        
        <div class="video-container">
            <video class="video-player" id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="quality-container">
            <h3>Select Quality:</h3>
            <button class="quality-btn active" data-quality="480p">480p</button>
            <button class="quality-btn" data-quality="720p">720p</button>
            <button class="quality-btn" data-quality="1080p">1080p</button>
        </div>
        
        <div class="episode-info">
            <h2>Episode <span id="episodeNumber">12</span>: <span id="episodeTitle">Loading...</span></h2>
            <p><strong>Status:</strong> <span id="episodeStatus">Available</span></p>
        </div>
        
        <h3 style="margin-top: 40px; margin-bottom: 20px;">Select Episode:</h3>
        <div class="episodes-grid" id="episodesContainer"></div>
    </div>

             9: {

             10: {

                videoUrls: {

                }
            },
             11: {
                title: "Episode 11 - Aftermath",
                description: "The consequences of the series' events unfold.",
                videoUrls: {
                    '480p': "https://hub.toxix.buzz/1b4c88ca7e9e89119079e0d970e18e8c?token=1775834619125",
                    '720p': "https://hub.toxix.buzz/77d8cdc5838c7a7ee6c0a91d58bb606a?token=1775835261125",
                    '1080p': "https://hub.toxix.buzz/9e83c15128dfe151eb3709cb75019436?token=1775834538126"
                }
            },
             12: {
                title: "Episode 12 - Legacy",
                description: "The legacy of the series' events continues to impact the characters.",
                videoUrls: {
                    '480p': "https://hub.toxix.buzz/dd79be00f6441823613f4e84c1914f68?token=1775834673126",
                    '720p': "https://hub.toxix.buzz/fb8f62874a141ae64c5b2a0fa5b37425?token=1775836637127",
                    '1080p': "https://hub.toxix.buzz/5d4f1ee852123b061b5f5107f0b4e00f?token=1775834732127"
                }
            },

        };
        
        let currentEpisode = 12; // Default to Episode 12
        let currentQuality = '480p'; // Default quality
        
        function changeQuality(quality) {
            currentQuality = quality;
            
            // Update video player
            const episode = episodes[currentEpisode];
            document.getElementById('videoSource').src = episode.videoUrls[quality];
            document.getElementById('videoPlayer').load();
            
            // Update active button
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-quality="${quality}"]`).classList.add('active');
        }
        
        function loadEpisode(episodeNum) {
            const episode = episodes[episodeNum];
            if (!episode) return;
            
            currentEpisode = episodeNum;
            
            // Update video player
            document.getElementById('videoSource').src = episode.videoUrls[currentQuality];
            document.getElementById('videoPlayer').load();
            
            // Update episode info
            document.getElementById('episodeNumber').textContent = episodeNum;
            document.getElementById('episodeTitle').textContent = episode.title.split(' - ')[1];
            document.getElementById('episodeDescription').textContent = episode.description;
            
            // Update active button
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-episode="${episodeNum}"]`).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }
        
        function initializeEpisodes() {
            const container = document.getElementById('episodesContainer');
            
            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === 12 ? ' active' : '');
                btn.textContent = `Episode ${i}`;
                btn.setAttribute('data-episode', i);
                btn.onclick = () => loadEpisode(i);
                container.appendChild(btn);
            }
            
            // Initialize quality buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = () => changeQuality(btn.getAttribute('data-quality'));
            });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeEpisodes();
            loadEpisode(12); // Load Episode 12 by default
        });
    </script>
</body>
</html>
