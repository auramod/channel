<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made In Korean - Movie Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #2f2371;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ff2222;
        }
        
        .header p {
            color: #a90000;
            font-size: 1.1em;
        }
        
        .video-container {
            background: #ed7272;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0px 24px rgba(255, 0, 0, 0.5);
        }
        
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        .movie-info {
            background: #2e0101;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .movie-info h2 {
            margin-bottom: 10px;
            color: #ff0707;
        }
        
        .movie-info p {
            color: #ff0000;
            margin-bottom: 8px;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .movie-btn {
            padding: 12px 20px;
            background: #fff9f9;
            border: 2px solid #555;
            color: #ff0000;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1em;
            text-align: center;
        }
        
        .movie-btn:hover {
            background: #bab5b5;
            border-color: #f5f2ff;
            transform: translateY(-2px);
        }
        
        .movie-btn.active {
            background: #000000;
            border-color: #000000;
            box-shadow: 0 0 15px #ff0000;
        }
        
        .quality-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .quality-container h3 {
            color: #ff0000;
            margin-bottom: 15px;
        }
        
        .quality-btn {
            padding: 10px 15px;
            background: #580000;
            border: 2px solid #520202;
            color: #ff0000;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
            margin: 0 5px;
        }
        
        .quality-btn:hover {
            background: #fcfcfc;
            border-color: #fe0000;
            transform: translateY(-2px);
        }
        
        .quality-btn.active {
            background: #000000;
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 1, 1, 0.5);
        }
        
        .description {
            background: #894e4e;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 20px;
            color: #aaa;
        }
        
        .description h3 {
            color: #640101;
            margin-bottom: 10px;
        }

        .movies-label {
            color: #f20000;
            font-size: 1.2em;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Demon Slayer: Kimetsu No Yaiba The Movie: Infinity Castle</h1>
            <p>movie</p>
        </div>
        
        <div class="video-container">
            <video class="video-player" id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="quality-container">
            <h3>Select Quality:</h3>
            <button class="quality-btn active" data-quality="480p">480p</button>
            <button class="quality-btn" data-quality="720p">720p</button>
            <button class="quality-btn" data-quality="1080p">1080p</button>
        </div>
        
        <div class="movie-info">
            <h2><span id="movieTitle">Loading...</span></h2>
            <p><strong>Year:</strong> <span id="movieYear">-</span></p>
            <p><strong>Genre:</strong> <span id="movieGenre">-</span></p>
        </div>
        
        
        <div class="movies-label"> Movie:</div>
        <div class="movies-grid" id="moviesContainer"></div>
    </div>
    
    <script>
        const movies = {
            1: {
                title: "Demon Slayer: Kimetsu No Yaiba The Movie: Infinity Castle",
                year: "2025",
                genre: "Animation, Action,",
                description: "Tanjiro Kamado and his companions face their greatest challenge yet as they enter the Infinity Castle.",
                videoUrls: {
                    '480p': "https://hub.hailmary.lat/565656a958005dba245c07d30d1d55ff?token=1775907312",
                    '720p': "https://hub.hailmary.lat/49b5432e9604efbf2df56b06e2e0a614?token=1775903543",
                    '1080p': "https://hub.hailmary.lat/4e2a93a4952418bf03988809907b73c8?token=1775901925"
                }
            }
        };
        
        let currentMovie = 1;
        let currentQuality = '480p'; // Default quality
        
        function changeQuality(quality) {
            currentQuality = quality;
            
            // Update video player
            const movie = movies[currentMovie];
            if (movie && movie.videoUrls[quality]) {
                document.getElementById('videoSource').src = movie.videoUrls[quality];
                document.getElementById('videoPlayer').load();
            }
            
            // Update active button
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-quality="${quality}"]`).classList.add('active');
        }
        
        function loadMovie(movieNum) {
            const movie = movies[movieNum];
            if (!movie) return;
            
            currentMovie = movieNum;
            
            // Update video player
            if (movie.videoUrls[currentQuality]) {
                document.getElementById('videoSource').src = movie.videoUrls[currentQuality];
                document.getElementById('videoPlayer').load();
            }
            
            // Update movie info
            document.getElementById('movieTitle').textContent = movie.title;
            document.getElementById('movieYear').textContent = movie.year;
            document.getElementById('movieGenre').textContent = movie.genre;
            document.getElementById('movieRating').textContent = movie.rating;
            document.getElementById('movieDescription').textContent = movie.description;
            
            // Update active button
            document.querySelectorAll('.movie-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-movie="${movieNum}"]`).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }
        
        function initializeMovies() {
            const container = document.getElementById('moviesContainer');
            
            for (let i = 1; i <= 1; i++) {
                const btn = document.createElement('button');
                btn.className = 'movie-btn' + (i === 1 ? ' active' : '');
                btn.textContent = `${movies[i].title}`;
                btn.setAttribute('data-movie', i);
                btn.onclick = () => loadMovie(i);
                container.appendChild(btn);
            }
            
            // Initialize quality buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = () => changeQuality(btn.getAttribute('data-quality'));
            });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeMovies();
            loadMovie(1); // Load first movie by default
        });
    </script>
</body>
</html>
