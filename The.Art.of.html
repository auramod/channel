    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #525254;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff;
        }
        
        .video-container {
            background: #373636;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0px 20px rgba(187, 187, 187, 0.5);
        }
        
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        .episode-info {
            background: #353535;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .episode-info h2 {
            margin-bottom: 10px;
            color: #929195;
        }
        
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .episode-btn {
            padding: 12px 20px;
            background: #3f3e3e;
            border: 2px solid #a3a0a0;
            color: #ffffff;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1em;
        }
        
        .episode-btn:hover {
            background: #000000;
            border-color: #5b5b5d;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(167, 166, 166, 0.5);
        }
        
        .episode-btn.active {
            background: #000000;
            border-color: #424141;
            box-shadow: 0 0 15px rgba(167, 166, 166, 0.5);
        }
        
        .quality-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .quality-btn {
            padding: 10px 15px;
            background: #373636;
            border: 2px solid #363636;
            color: #f7f7ff;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
            margin: 0 5px;
        }
        
        .quality-btn:hover {
            background: #000000;
            border-color: #000000;
            transform: translateY(-2px);
        }
        
        .quality-btn.active {
            background: #000000;
            border-color: #464545;
            box-shadow: 0 0 15px rgba(249, 245, 245, 0.5);
        }
        
        .description {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>

        let currentEpisode = 8; // Default to Episode 8
        let currentQuality = '720p'; // Default quality
        
        function changeQuality(quality) {
            currentQuality = quality;
            
            // Update video player
            const episode = episodes[currentEpisode];
            document.getElementById('videoSource').src = episode.videoUrls[quality];
            document.getElementById('videoPlayer').load();
            
            // Update active button
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-quality="${quality}"]`).classList.add('active');
        }
        
        function loadEpisode(episodeNum) {
            const episode = episodes[episodeNum];
            if (!episode) return;
            
            currentEpisode = episodeNum;
            
            // Update video player
            document.getElementById('videoSource').src = episode.videoUrls[currentQuality];
            document.getElementById('videoPlayer').load();
            
            // Update episode info
            document.getElementById('episodeNumber').textContent = episodeNum;
            document.getElementById('episodeTitle').textContent = episode.title.split(' - ')[1];
            document.getElementById('episodeDescription').textContent = episode.description;
            
            // Update active button
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-episode="${episodeNum}"]`).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }
        
        function initializeEpisodes() {
            const container = document.getElementById('episodesContainer');
            
            for (let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === 8 ? ' active' : '');
                btn.textContent = `Episode ${i}`;
                btn.setAttribute('data-episode', i);
                btn.onclick = () => loadEpisode(i);
                container.appendChild(btn);
            }
            
            // Initialize quality buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = () => changeQuality(btn.getAttribute('data-quality'));
            });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeEpisodes();
            loadEpisode(8); // Load Episode 8 by default
        });
