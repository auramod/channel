<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the art of sarah - Drama Video Player</title>
    <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #f90b0b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ff0000;
        }
        
        .video-container {
            background: #3f2626;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(240, 59, 59, 0.5);
        }
        
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000000;
        }
        
        .episode-info {
            background: #4f0101;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .episode-info h2 {
            margin-bottom: 10px;
            color: #ff0000;
        }
        
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .episode-btn {
            padding: 12px 20px;
            background: #3a0000;
            border: 0px solid #555;
            color: #ff0000;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1em;
        }
        
        .episode-btn:hover {
            background: #f8f6ff;
            border-color: #eb5c5c;
            transform: translateY(-2px);
        }
        
        .episode-btn.active {
            background: #000000;
            border-color: #000000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .quality-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .quality-btn {
            padding: 10px 100px;
            background: #3f0000;
            border: 2px solid #000000;
            color: #ff0404;
            cursor: pointer;
            border-radius: 0px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
            margin: 0 5px;
        }
        
        .quality-btn:hover {
            background: #ffffff;
            border-color: #040000;
            transform: translateY(-2px);
        }
        
        .quality-btn.active {
            background: #000000;
            border-color: #e70909;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .description {
            background: #4a0000;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> THE ART OF SARAH</h1>
            <p>K-Drama Series | Watch All Episodes</p>
        </div>
        
        <div class="video-container">
            <video class="video-player" id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="quality-container">
            <h3>Select Quality:</h3>
            <button class="quality-btn active" data-quality="720p">720p</button>
            <button class="quality-btn" data-quality="1080p">1080p</button>
        </div>
        
        <div class="episode-info">
            <h2>Episode <span id="episodeNumber">8</span>: <span id="episodeTitle">Loading...</span></h2>
            <p><strong>Status:</strong> <span id="episodeStatus">Available</span></p>
        </div>
        
        <h3 style="margin-top: 40px; margin-bottom: 20px;">Select Episode:</h3>
        <div class="episodes-grid" id="episodesContainer"></div>
    </div>
    
    <script>
        const episodes = {
            1: {
                title: "Episode 1 - The Beginning",
                description: "Gun-woo puts his mother's safety first; Hong Woo-jin turns to an old friend for help; but Baek-jeong's men soon catch up after tailing their every move.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/ad4f4776322de71825315d46f9b943bb?token=1775910021150",
                    '1080p': "https://hub.hailmary.lat/f23f207698e51e914bc5af13acf89607?token=1775910046150"
                }
            },
            2: {
                title: "Episode 2 - Secrets Unveiled",
                description: "Hidden secrets start to surface as investigations deepen.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/eb506b76fde96cbf6a13c55fc099f263?token=1775910068151",
                    '1080p': "https://hub.hailmary.lat/8953310f39a1dda05388f87708dd087a?token=1775910195153"
                }
            },
            3: {
                title: "Episode 3 - The Hunt",
                description: "The search intensifies with new clues and suspects.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/b2f05379abff3e1d096572ee2542ea1e?token=1775910223153",
                    '1080p': "https://hub.hailmary.lat/ef98123c00b1c32a32f9d875f3f41f64?token=1775910245154"
                }
            },
            4: {
                title: "Episode 4 - Betrayal",
                description: "Trust is shattered as betrayal comes from an unexpected source.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/5cc595ee4785900810edc6ab1ef2fe62?token=1775910272154",
                    '1080p': "https://hub.hailmary.lat/49d7d71388b2d2139ed0d0643b214d66?token=1775910298154"
                }
            },
            5: {
                title: "Episode 5 - Breakthrough",
                description: "A major breakthrough brings new leads and complications.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/8039df7627a0e6cf010fc3fa0505b043?token=1775910332155",
                    '1080p': "https://hub.hailmary.lat/86792a6d4d9af32044a956affc40913f?token=1775910356155"
                }
            },
            6: {
                title: "Episode 6 - The Trap",
                description: "Our heroes fall into a dangerous trap set by the antagonist.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/273d4613b64f48949d9c693d91baaa2e?token=1775910378156",
                    '1080p': "https://hub.hailmary.lat/d9ef117151ace6d81dfa461d93210cf8?token=1775910406156"
                }
            },
            7: {
                title: "Episode 7 - Escape",
                description: "A daring escape attempt puts everything on the line.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/db3f4b8837e9debe052df8f2c497c54f?token=1775910433157",
                    '1080p': "https://hub.hailmary.lat/27ccc1071c2d594d2e1b8b2b20b2f1ef?token=1775910458157"
                }
            },
             8: {
                title: "Episode 8 - Revelation",
                description: "Dark secrets are revealed, changing everything.",
                videoUrls: {
                    '720p': "https://hub.hailmary.lat/cfeefbed9277df400e6b4a2a62386f87?token=1775910522158",
                    '1080p': "https://hub.hailmary.lat/55ff98184da9fee73b33cb25968c7297?token=1775910551159"
                }
            },

        };
        
        let currentEpisode = 8; // Default to Episode 8
        let currentQuality = '480p'; // Default quality
        
        function changeQuality(quality) {
            currentQuality = quality;
            
            // Update video player
            const episode = episodes[currentEpisode];
            document.getElementById('videoSource').src = episode.videoUrls[quality];
            document.getElementById('videoPlayer').load();
            
            // Update active button
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-quality="${quality}"]`).classList.add('active');
        }
        
        function loadEpisode(episodeNum) {
            const episode = episodes[episodeNum];
            if (!episode) return;
            
            currentEpisode = episodeNum;
            
            // Update video player
            document.getElementById('videoSource').src = episode.videoUrls[currentQuality];
            document.getElementById('videoPlayer').load();
            
            // Update episode info
            document.getElementById('episodeNumber').textContent = episodeNum;
            document.getElementById('episodeTitle').textContent = episode.title.split(' - ')[1];
            document.getElementById('episodeDescription').textContent = episode.description;
            
            // Update active button
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-episode="${episodeNum}"]`).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }
        
        function initializeEpisodes() {
            const container = document.getElementById('episodesContainer');
            
            for (let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === 9 ? ' active' : '');
                btn.textContent = `Episode ${i}`;
                btn.setAttribute('data-episode', i);
                btn.onclick = () => loadEpisode(i);
                container.appendChild(btn);
            }
            
            // Initialize quality buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = () => changeQuality(btn.getAttribute('data-quality'));
            });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeEpisodes();
            loadEpisode(8); // Load Episode 8 by default
        });
    </script>
</body>
</html>
