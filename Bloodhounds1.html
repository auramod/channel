<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bloodhound s1 - Drama Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #525254;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff;
        }
        
        .video-container {
            background: #373636;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0px 20px rgba(187, 187, 187, 0.5);
        }
        
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        .episode-info {
            background: #353535;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .episode-info h2 {
            margin-bottom: 10px;
            color: #929195;
        }
        
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .episode-btn {
            padding: 12px 20px;
            background: #3f3e3e;
            border: 2px solid #a3a0a0;
            color: #ffffff;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1em;
        }
        
        .episode-btn:hover {
            background: #000000;
            border-color: #5b5b5d;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(167, 166, 166, 0.5);
        }
        
        .episode-btn.active {
            background: #000000;
            border-color: #424141;
            box-shadow: 0 0 15px rgba(167, 166, 166, 0.5);
        }
        
        .quality-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .quality-btn {
            padding: 10px 15px;
            background: #373636;
            border: 2px solid #363636;
            color: #f7f7ff;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
            margin: 0 5px;
        }
        
        .quality-btn:hover {
            background: #000000;
            border-color: #000000;
            transform: translateY(-2px);
        }
        
        .quality-btn.active {
            background: #000000;
            border-color: #464545;
            box-shadow: 0 0 15px rgba(249, 245, 245, 0.5);
        }
        
        .description {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>bloodhounds S1</h1>
            <p>K-Drama Series | Watch All Episodes</p>
        </div>
        
        <div class="video-container">
            <video class="video-player" id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="quality-container">
            <h3>Select Quality:</h3>
            <button class="quality-btn active" data-quality="720p">720p</button>
        </div>
        
        <div class="episode-info">
            <h2>Episode <span id="episodeNumber">8</span>: <span id="episodeTitle">Loading...</span></h2>
            <p><strong>Status:</strong> <span id="episodeStatus">Available</span></p>
        </div>
        
        <h3 style="margin-top: 40px; margin-bottom: 20px;">Select Episode:</h3>
        <div class="episodes-grid" id="episodesContainer"></div>
    </div>
    
    <script>
         const episodes = {
            1: {
                title: "Episode 1 - The Beginning",
                description: "Gun-woo puts his mother's safety first; Hong Woo-jin turns to an old friend for help; but Baek-jeong's men soon catch up after tailing their every move.",
                videoUrls: {
                    '720p': "https://cdn.fsl-buckets.life/Bloodhounds.S01E01.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=952f5f7e32c7c79652c4ebdaecb8b899_125" ,
                }
            },
            2: {
                title: "Episode 2 - Secrets Unveiled",
                description: "Hidden secrets start to surface as investigations deepen.",
                videoUrls: {
                    '720p': "https://fsl.gigabytes.icu/Bloodhounds.S01E02.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=952f5f7e32c7c79652c4ebdaecb8b899_130",
                }
            },
            3: {
                title: "Episode 3 - The Hunt",
                description: "The search intensifies with new clues and suspects.",
                videoUrls: {
                    '720p': "https://cdn.fsl-buckets.work/Bloodhounds.S01E03.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=4078cb82f424b108440c6426e5a44af5_131",
                }
            },
            4: {
                title: "Episode 4 - Betrayal",
                description: "Trust is shattered as betrayal comes from an unexpected source.",
                videoUrls: {
                    '720p': "https://cdn.fsl-buckets.life/Bloodhounds.S01E04.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=ab34424516bdb2c1ae57cd9480c8b338_142",
                }
            },
            5: {
                title: "Episode 5 - Breakthrough",
                description: "A major breakthrough brings new leads and complications.",
                videoUrls: {
                    '720p': "https://cdn.fsl-buckets.work/Bloodhounds.S01E05.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=4078cb82f424b108440c6426e5a44af5_130",
                }
            },
            6: {
                title: "Episode 6 - The Trap",
                description: "Our heroes fall into a dangerous trap set by the antagonist.",
                videoUrls: {
                    '720p': "https://fsl.gigabytes.icu/Bloodhounds.S01E06.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=ab34424516bdb2c1ae57cd9480c8b338_146",
                }
            },
            7: {
                title: "Episode 7 - Escape",
                description: "A daring escape attempt puts everything on the line.",
                videoUrls: {
                    '720p': "https://cdn.fukggl.buzz/Bloodhounds.S01E07.720p.WEB-DL.Hindi.AAC.5.1-English.ESub.x264-HDHub4u.Tv.mkv?token=ab34424516bdb2c1ae57cd9480c8b338_147",
                }
            },
             8: {
                title: "Episode 8 - Revelation",
                description: "Dark secrets are revealed, changing everything.",
                videoUrls: {
                    '720p': "https://video-downloads.googleusercontent.com/ADGPM2nDxMQUmA9L9oWgf4yeGn9szqYEKTfM-j2QdqX3KVQirexuXPpSEaJkKNzCmwK4s6EkvQ6BCctV53jLFyhuNPLxpIVASqI7nEWtgH0jXGIHI7JA_5gh_H35w-0cfZ7QxcYAnodDqmFpp7KK-sWVWvM5jeJ8OUChKsfXVIlk5OsQ6QLFXn6RUHMz-5SpbABWAwYhlgIhSQIQKQ63CCnJMINvLILa2rPrs8vJZ5HqjSRwdc_lOVE",
                }
            },

        };

        
        let currentEpisode = 8; // Default to Episode 8
        let currentQuality = '480p'; // Default quality
        
        function changeQuality(quality) {
            currentQuality = quality;
            
            // Update video player
            const episode = episodes[currentEpisode];
            document.getElementById('videoSource').src = episode.videoUrls[quality];
            document.getElementById('videoPlayer').load();
            
            // Update active button
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-quality="${quality}"]`).classList.add('active');
        }
        
        function loadEpisode(episodeNum) {
            const episode = episodes[episodeNum];
            if (!episode) return;
            
            currentEpisode = episodeNum;
            
            // Update video player
            document.getElementById('videoSource').src = episode.videoUrls[currentQuality];
            document.getElementById('videoPlayer').load();
            
            // Update episode info
            document.getElementById('episodeNumber').textContent = episodeNum;
            document.getElementById('episodeTitle').textContent = episode.title.split(' - ')[1];
            document.getElementById('episodeDescription').textContent = episode.description;
            
            // Update active button
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-episode="${episodeNum}"]`).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }
        
        function initializeEpisodes() {
            const container = document.getElementById('episodesContainer');
            
            for (let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === 9 ? ' active' : '');
                btn.textContent = `Episode ${i}`;
                btn.setAttribute('data-episode', i);
                btn.onclick = () => loadEpisode(i);
                container.appendChild(btn);
            }
            
            // Initialize quality buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = () => changeQuality(btn.getAttribute('data-quality'));
            });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeEpisodes();
            loadEpisode(8); // Load Episode 8 by default
        });
    </script>
</body>
</html>
