<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodhounds - Drama Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #f90b0b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ff0000;
        }
        
        .video-container {
            background: #3f2626;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(240, 59, 59, 0.5);
        }
        
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000000;
        }
        
        .episode-info {
            background: #4f0101;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        
        .episode-info h2 {
            margin-bottom: 10px;
            color: #ff0000;
        }
        
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .episode-btn {
            padding: 12px 20px;
            background: #3a0000;
            border: 0px solid #555;
            color: #ff0000;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1em;
        }
        
        .episode-btn:hover {
            background: #f8f6ff;
            border-color: #eb5c5c;
            transform: translateY(-2px);
        }
        
        .episode-btn.active {
            background: #000000;
            border-color: #000000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .quality-container {
            margin-top: 20px;
            text-align: center;
        }
        
        .quality-btn {
            padding: 10px 100px;
            background: #3f0000;
            border: 2px solid #000000;
            color: #ff0404;
            cursor: pointer;
            border-radius: 0px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
            margin: 0 5px;
        }
        
        .quality-btn:hover {
            background: #ffffff;
            border-color: #040000;
            transform: translateY(-2px);
        }
        
        .quality-btn.active {
            background: #000000;
            border-color: #e70909;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .description {
            background: #4a0000;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 BLOODHOUNDS</h1>
            <p>K-Drama Series | Watch All Episodes</p>
        </div>
        
        <div class="video-container">
            <video class="video-player" id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="quality-container">
            <h3>Select Quality:</h3>
            <button class="quality-btn" data-quality="720p">720p</button>
            <button class="quality-btn" data-quality="1080p">1080p</button>
        </div>
        
        <div class="episode-info">
            <h2>Episode <span id="episodeNumber">12</span>: <span id="episodeTitle">Loading...</span></h2>
            <p><strong>Status:</strong> <span id="episodeStatus">Available</span></p>
        </div>
        
        <div class="description">
            <h3>Description</h3>
            <p id="episodeDescription">Episode 12 description will be displayed here...</p>
        </div>
        
        <h3 style="margin-top: 40px; margin-bottom: 20px;">Select Episode:</h3>
        <div class="episodes-grid" id="episodesContainer"></div>
    </div>
    
    <script>
        const episodes = {
            1: {
                title: "Episode 1 - The Beginning",
                description: "Gun-woo puts his mother's safety first; Hong Woo-jin turns to an old friend for help; but Baek-jeong's men soon catch up after tailing their every move.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/b48ae446c9303f78daad35a902ac7223?token=1775362562",
                    '1080p': "https://hub.toxix.buzz/0b4b00d9cf42c213fff5e3362d2f1952?token=1775832250"
                }
            },
            2: {
                title: "Episode 2 - Secrets Unveiled",
                description: "Hidden secrets start to surface as investigations deepen.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/93d935ecc9e01a81c5ae604ff6631730?token=1775364126",
                    '1080p': "https://hub.toxix.buzz/e9aec61844fb6b0b7c13ed6bd1182e5a?token=1775832539"
                }
            },
            3: {
                title: "Episode 3 - The Hunt",
                description: "The search intensifies with new clues and suspects.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/64f01e79dc30cc18604c9ced78dab640?token=1775364077",
                    '1080p': "https://hub.toxix.buzz/967352d33aa981b9385ba400209907c5?token=1775832582"
                }
            },
            4: {
                title: "Episode 4 - Betrayal",
                description: "Trust is shattered as betrayal comes from an unexpected source.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/f4a917493c3c59a2ed8f540ca663ce6c?token=1775361579",
                    '1080p': "https://hub.toxix.buzz/ba4067f4b0aa0825282e066c88a31865?token=1775832643"
                }
            },
            5: {
                title: "Episode 5 - Breakthrough",
                description: "A major breakthrough brings new leads and complications.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/c10df978e9a72e3e7dea9a4418fe18dd?token=1775361973",
                    '1080p': "https://hub.toxix.buzz/f6c7c1ab673495ed98a3a7ec2e6631a1?token=1775832689"
                }
            },
            6: {
                title: "Episode 6 - The Trap",
                description: "Our heroes fall into a dangerous trap set by the antagonist.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/c3874598ad6e1713ca6614e6c3a782f4?token=1775359745",
                    '1080p': "https://hub.toxix.buzz/6aed4b3b7946a0ab15ea63093775a9dd?token=1775832738"
                }
            },
            7: {
                title: "Episode 7 - Escape",
                description: "A daring escape attempt puts everything on the line.",
                videoUrls: {
                    '720p': "https://hub.toxix.buzz/f5713686a7d7da30243777225ddc8eee?token=1775364113",
                    '1080p': "https://hub.toxix.buzz/635c5d56de95b5edbba5ca621d09133b?token=1775832784"
                }
            },

        };
        
        let currentEpisode = 7; // Default to Episode 7
        let currentQuality = '480p'; // Default quality
        
        function changeQuality(quality) {
            currentQuality = quality;
            
            // Update video player
            const episode = episodes[currentEpisode];
            document.getElementById('videoSource').src = episode.videoUrls[quality];
            document.getElementById('videoPlayer').load();
            
            // Update active button
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-quality="${quality}"]`).classList.add('active');
        }
        
        function loadEpisode(episodeNum) {
            const episode = episodes[episodeNum];
            if (!episode) return;
            
            currentEpisode = episodeNum;
            
            // Update video player
            document.getElementById('videoSource').src = episode.videoUrls[currentQuality];
            document.getElementById('videoPlayer').load();
            
            // Update episode info
            document.getElementById('episodeNumber').textContent = episodeNum;
            document.getElementById('episodeTitle').textContent = episode.title.split(' - ')[1];
            document.getElementById('episodeDescription').textContent = episode.description;
            
            // Update active button
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-episode="${episodeNum}"]`).classList.add('active');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }
        
        function initializeEpisodes() {
            const container = document.getElementById('episodesContainer');
            
            for (let i = 1; i <= 7; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-btn' + (i === 7 ? ' active' : '');
                btn.textContent = `Episode ${i}`;
                btn.setAttribute('data-episode', i);
                btn.onclick = () => loadEpisode(i);
                container.appendChild(btn);
            }
            
            // Initialize quality buttons
            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = () => changeQuality(btn.getAttribute('data-quality'));
            });
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeEpisodes();
            loadEpisode(7); // Load Episode 7 by default
        });
    </script>
</body>
</html>
